project_name: k3d

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }}'
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    binary: 'terraform-provider-{{ .ProjectName }}_v{{ .Version }}'

archives:
  - format: zip
    name_template: 'terraform-provider-{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: 'terraform-provider-{{ .ProjectName }}_v{{ .Version }}_SHA256SUMS'
  algorithm: sha256

snapshot:
  name_template: '0.1.0-{{ .ShortCommit }}'

changelog:
  skip: true
