project_name: k3d

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }}'
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Binary name inside the archive; use version without leading 'v'
    binary: 'terraform-provider-{{ .ProjectName }}_{{ .Version }}'

archives:
  - format: zip
    # Filename uses version without leading 'v'
    name_template: 'terraform-provider-{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  # Checksum filename uses version without leading 'v'
  name_template: 'terraform-provider-{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

snapshot:
  name_template: '0.1.0-{{ .ShortCommit }}'

changelog:
  skip: true

signs:
  - id: checksum
    artifacts: checksum
    signature: '${artifact}.sig'
    cmd: gpg
    args:
      - --batch
      - --pinentry-mode
      - loopback
      - --detach-sign
      - --armor
      - --output
      - '${signature}'
      - '${artifact}'

release:
  draft: false
