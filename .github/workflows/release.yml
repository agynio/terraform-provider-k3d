# This GitHub action can publish assets for release when a tag is created.
# Currently its setup to run on any tag that matches the pattern "v*" (ie. v0.1.0).
#
# GPG signing is optional:
# - If GPG_PRIVATE_KEY and PASSPHRASE secrets are set, we import the key and sign.
# - If not set, we skip signing and still build/upload artifacts.
#
name: release
on:
  push:
    tags:
      - 'v*'
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
      - name: Unshallow
        run: git fetch --prune --unshallow
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Import GPG key (optional)
        id: import_gpg
        if: ${{ secrets.GPG_PRIVATE_KEY != '' && secrets.PASSPHRASE != '' }}
        uses: crazy-max/ghaction-import-gpg@v5.3.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Run GoReleaser (with signing)
        if: ${{ secrets.GPG_PRIVATE_KEY != '' && secrets.PASSPHRASE != '' }}
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --rm-dist --config .goreleaser.yaml
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GoReleaser (skip signing)
        if: ${{ secrets.GPG_PRIVATE_KEY == '' || secrets.PASSPHRASE == '' }}
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --rm-dist --config .goreleaser.yaml --skip=sign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
